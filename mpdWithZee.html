<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        
        /* ভিডিও প্লেয়ার স্টাইল */
        #video-player-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; display: none; flex-direction: column;
        }
        
        /* কাস্টম চ্যানেল কার্ড */
        .channel-card {
            transition: all 0.3s ease;
            border: 1px solid #1e293b;
        }
        .channel-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* লোডিং স্পিনার */
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .active { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-500">Live Streaming Portal</h1>
        
        <div class="mb-6">
            <input type="text" class="search-bar w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500" placeholder="চ্যানেলের নাম খুঁজুন...">
        </div>

        <div class="flex flex-wrap gap-2 mb-8 justify-center">
            <button class="tab-button px-4 py-2 bg-gray-700 rounded-full text-sm font-medium hover:bg-gray-600 transition" data-tab="jio-tv">Jio TV</button>
            <button class="tab-button px-4 py-2 bg-gray-700 rounded-full text-sm font-medium hover:bg-gray-600 transition" data-tab="zee-network">Zee Network</button>
            <button class="tab-button px-4 py-2 bg-gray-700 rounded-full text-sm font-medium hover:bg-gray-600 transition" data-tab="fancode">FanCode</button>
            <button class="tab-button px-4 py-2 bg-gray-700 rounded-full text-sm font-medium hover:bg-gray-600 transition" data-tab="jiostar">Jio Star</button>
            <button class="tab-button px-4 py-2 bg-gray-700 rounded-full text-sm font-medium hover:bg-gray-600 transition" data-tab="n-stream">Enter Link</button>
        </div>

        <div id="content-display" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </div>

<div id="video-player-container" 
     style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); z-index: 99999; align-items: center; justify-content: center;">
    
    <div style="width: 95%; max-width: 850px; position: relative; margin: auto;">
        
        <button onclick="closePlayer()" 
                style="position: absolute; top: -45px; right: 0; background: #ff0000; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">
            বন্ধ করুন (Close) ✕
        </button>
        
        <div id="shaka-video-container" data-shaka-player-container 
             style="width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid #444; border-radius: 8px; overflow: hidden;">
            <video id="shaka-video-player" data-shaka-player style="width: 100%; height: 100%;"></video>
        </div>

        <video id="hls-video-player" controls 
               style="display: none; width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid #444; border-radius: 8px;"></video>
        
        <select id="quality-selector" 
                style="display: none; margin-top: 10px; padding: 5px; background: #333; color: white; border: 1px solid #666; border-radius: 4px;">
        </select>
        
    </div>
</div>

    <div id="n-stream-player-section" class="hidden flex-col items-center p-6 bg-gray-800 rounded-lg max-w-xl mx-auto mt-10">
        <h2 class="text-xl mb-4">Custom URL Play</h2>
        <input id="stream-url-input" type="text" placeholder="Stream URL (MPD/M3U8)" class="w-full p-2 mb-3 bg-gray-900 border border-gray-700 rounded">
        <select id="stream-type-select" class="w-full p-2 mb-3 bg-gray-900 border border-gray-700 rounded">
            <option value="HLS">HLS (M3U8)</option>
            <option value="DASH">DASH (MPD)</option>
        </select>
        <div id="drm-controls" class="hidden flex-col w-full">
            <input id="clearkey-id-input" placeholder="ClearKey ID" class="w-full p-2 mb-2 bg-gray-900 border border-gray-700 rounded">
            <input id="clearkey-key-input" placeholder="ClearKey Key" class="w-full p-2 mb-2 bg-gray-900 border border-gray-700 rounded">
            <input id="drm-license-url-input" placeholder="License URL (Optional)" class="w-full p-2 mb-2 bg-gray-900 border border-gray-700 rounded">
        </div>
        <button id="play-n-stream-btn" class="bg-blue-600 px-6 py-2 rounded font-bold hover:bg-blue-700 transition">চালান (Play)</button>
    </div>


<script>
    // আপনার জাভাস্ক্রিপ্ট কোড এখানে বসবে...
  
        const contentDisplay = document.getElementById('content-display');
        const tabButtons = document.querySelectorAll('.tab-button');
        const videoPlayerContainer = document.getElementById('video-player-container');
        const shakaVideoContainer = document.getElementById('shaka-video-player').parentNode;
        const shakaVideoElement = document.getElementById('shaka-video-player');
        const hlsVideoElement = document.getElementById('hls-video-player');
        
        const qualitySelector = document.getElementById('quality-selector');

        let shakaPlayerInstance = null;
        let hlsPlayer = null;
        let currentLoadedChannels = [];
        let isShakaUINotReady = true;

        // N Stream elements
        const nStreamPlayerSection = document.getElementById('n-stream-player-section');
        const streamTypeSelect = document.getElementById('stream-type-select');
        const streamUrlInput = document.getElementById('stream-url-input');
        const drmControls = document.getElementById('drm-controls');
        const clearkeyIdInput = document.getElementById('clearkey-id-input');
        const clearkeyKeyInput = document.getElementById('clearkey-key-input');
        const drmLicenseUrlInput = document.getElementById('drm-license-url-input');
        const playNStreamBtn = document.getElementById('play-n-stream-btn');

        // GitHub Raw JSON URLs
        const tabDataUrls = {
            'zee-network': 'https://raw.githubusercontent.com/greenhck/batball/main/zee.json',
            'fancode': 'https://raw.githubusercontent.com/Odfinity/live-events/refs/heads/main/fancode/data.json',
            'pirates-tv': 'https://raw.githubusercontent.com/FunctionError/PiratesTv/main/combined_playlist.m3u',
            'jio-tv': 'https://raw.githubusercontent.com/rocket12-18/dineshbhai/refs/heads/main/jd.m3u',
            'others': 'https://raw.githubusercontent.com/FunctionError/PiratesTv/main/combine_playlist.m3u',
            'jiostar': 'https://raw.githubusercontent.com/alex4528/m3u/refs/heads/main/jtv.m3u',
            'n-stream': null,
        };
        
        // Initialize Shaka Player UI once it's loaded
        document.addEventListener('shaka-ui-loaded', () => {
            console.log('Shaka UI Loaded, initializing Shaka Player instance...');
            shaka.polyfill.installAll(); // Install polyfills once

            const ui = shakaVideoElement['ui'];
            const controls = ui.getControls();
            shakaPlayerInstance = controls.getPlayer();

            shakaPlayerInstance.addEventListener('error', onErrorEvent);
            shakaPlayerInstance.configure({
                streaming: {
                    bufferingGoal: 1,
                    rebufferingGoal: 0.5
                }
            });
            isShakaUINotReady = false;
            console.log('Shaka Player instance initialized via UI.');
        });

        // Channel display functions
        function displayChannels(channels) {
            currentLoadedChannels = channels;
            contentDisplay.innerHTML = '';
            if (channels.length === 0) {
                contentDisplay.innerHTML = `<p class="text-center text-gray-400 p-4">कोई चैनल/मैच नहीं मिला।</p>`;
                return;
            }
            channels.forEach(channel => {
                const channelCard = document.createElement('div');
                channelCard.classList.add('channel-card', 'bg-gray-800', 'rounded-lg', 'overflow-hidden', 'shadow-lg', 'cursor-pointer', 'transform', 'transition-transform', 'duration-200', 'hover:-translate-y-1', 'hover:shadow-2xl');
                channelCard.innerHTML = `
                    <img src="${channel.logo || 'https://placehold.co/200x150/2d3748/a0aec0?text=No+Image'}" alt="${channel.name}" class="w-full h-32 sm:h-40 object-cover">
                    <h3 class="p-2 sm:p-3 text-sm sm:text-base font-semibold text-center truncate">${channel.name}</h3>
                `;
                channelCard.addEventListener('click', () => playChannel(channel));
                contentDisplay.appendChild(channelCard);
            });
        }

        async function parseM3U(m3uContent) {
            const lines = m3uContent.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {
                        name: 'Unknown Channel',
                        logo: '',
                        mpd: null,
                        m3u8: null,
                        clearkey: null,
                        cookie: null
                    };

                    const nameMatch = line.match(/,(.+)$/);
                    currentChannel.name = nameMatch ? nameMatch[1].trim() : 'Unknown Channel';
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';

                    // Parse subsequent lines for metadata until a URL is found
                    let urlFound = false;
                    let j = i + 1;
                    while (j < lines.length && !urlFound) {
                        const subLine = lines[j];
                        if (subLine.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                            const clearkeyMatch = subLine.match(/license_key=([^:]+):([a-f0-9]+)/);
                            if (clearkeyMatch) {
                                currentChannel.clearkey = {
                                    keyId: clearkeyMatch[1],
                                    key: clearkeyMatch[2]
                                };
                            }
                        } else if (subLine.startsWith('#EXTHTTP:')) {
                            const cookieMatch = subLine.match(/"cookie":"([^"]+)"/);
                            if (cookieMatch) {
                                currentChannel.cookie = cookieMatch[1];
                            }
                        } else if (!subLine.startsWith('#')) {
                            // This is the stream URL
                            if (subLine.includes('.mpd')) {
                                // Clean up URL and remove extra parameters
                                const mpdUrl = subLine.split('&xxx=')[0];
                                currentChannel.mpd = mpdUrl;
                            } else if (subLine.includes('.m3u8')) {
                                currentChannel.m3u8 = subLine;
                            }
                            urlFound = true;
                            i = j; // Advance main loop
                        }
                        j++;
                    }
                    if (currentChannel.mpd || currentChannel.m3u8) {
                        channels.push(currentChannel);
                    }
                }
            }
            return channels;
        }

        async function loadAndDisplayChannels(tabName) {
            // Hide all special sections by default
            nStreamPlayerSection.classList.add('hidden');
            nStreamPlayerSection.classList.remove('flex');
            contentDisplay.style.display = 'grid'; // Show grid for regular tabs
            videoPlayerContainer.classList.add('hidden');
            videoPlayerContainer.classList.remove('flex');

            if (tabName === 'n-stream') {
                contentDisplay.style.display = 'none';
                nStreamPlayerSection.classList.remove('hidden');
                nStreamPlayerSection.classList.add('flex');
                return;
            }

            // Update loading message with spinner
            contentDisplay.innerHTML = `
                <div class="flex items-center justify-center p-4">
                    <div class="loading-spinner mr-3"></div>
                    <p class="text-center text-gray-400 font-semibold">Loading channels...</p>
                </div>
            `;

            const dataUrl = tabDataUrls[tabName];

            if (!dataUrl || dataUrl.includes('YOUR_')) {
                contentDisplay.innerHTML = `<p class="text-center text-red-400 p-4 font-semibold ${tabName}</p>`;
                return;
            }

            try {
                const response = await fetch(dataUrl);
                if (!response.ok) {
                    throw new Error(`HTTP  ${response.status}`);
                }
                let channelsToDisplay = [];

                if (tabName === 'zee-network') {
                    const data = await response.json();
                    if (data && data.channels) {
                        channelsToDisplay = data.channels;
                    } else {
                        console.warn('Zee Network JSON  "channels" key ', data);
                        contentDisplay.innerHTML = `<p class="text-center text-gray-400 p-4">Zee Network </p>`;
                        return;
                    }
                } else if (tabName === 'fancode') {
                    const data = await response.json();
                    if (data && data.matches) {
                        channelsToDisplay = data.matches.map(match => ({
                            name: `${match.event_name}: ${match.match_name}`,
                            logo: match.src || 'https://placehold.co/200x150/2d3748/a0aec0?text=No+Image',
                            mpd: match.dai_url,
                            m3u8: match.adfree_url,
                            clearkey: null
                        }));
                    } else {
                        console.warn('FanCode JSON  "matches" key ', data);
                        contentDisplay.innerHTML = `<p class="text-center text-gray-400 p-4">FanCode </p>`;
                        return;
                    }
                } else {
                    const m3uContent = await response.text();
                    channelsToDisplay = await parseM3U(m3uContent);
                }

                displayChannels(channelsToDisplay);

            } catch (error) {
                console.error('', error);
                contentDisplay.innerHTML = `<p class="text-center text-gray-400 p-4"></p>`;
            }
        }

        // Player functions
        function resetPlayers() {
            shakaVideoContainer.style.display = 'none';
            hlsVideoElement.style.display = 'none';

            if (shakaPlayerInstance) {
                shakaPlayerInstance.unload().catch(e => console.warn("Shaka Player unload failed:", e));
            }
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }

            shakaVideoElement.pause();
            shakaVideoElement.removeAttribute('src');
            shakaVideoElement.load();

            hlsVideoElement.pause();
            hlsVideoElement.removeAttribute('src');
            hlsVideoElement.load();

            qualitySelector.innerHTML = '<option value="auto"></option>';
            qualitySelector.classList.add('hidden');
        }

       async function playChannel(channel) {
    // ১. প্লেয়ার কন্টেইনার এবং এলিমেন্টগুলো ধরা
    const container = document.getElementById('video-player-container');
    const shakaContainer = document.getElementById('shaka-video-container');
    const hlsElement = document.getElementById('hls-video-player');

    // ২. ফ্রেমটি স্ক্রিনে দেখানোর জন্য স্টাইল সেট করা
    container.style.display = 'flex'; 
    resetPlayers();

    // Shaka Polyfills ইনস্টল করা
    shaka.polyfill.installAll();

    try {
        // ৩. HLS (.m3u8) চেক করা
        if (channel.m3u8) {
            shakaContainer.style.display = 'none';
            hlsElement.style.display = 'block';

            if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(channel.m3u8);
                hlsPlayer.attachMedia(hlsElement);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('HLS Loaded!');
                    hlsElement.play().catch(e => console.warn('HLS play failed:', e));
                });
                hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hlsPlayer.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hlsPlayer.recoverMediaError(); break;
                            default: 
                                resetPlayers(); 
                               // alert('HLS ত্রুটি ঘটেছে।');
                              //  closePlayer();
                                break;
                        }
                    }
                });
            } else if (hlsElement.canPlayType('application/vnd.apple.mpegurl')) {
                hlsElement.src = channel.m3u8;
                hlsElement.play().catch(e => console.warn('Native HLS play failed:', e));
            } else {
               // alert('আপনার ব্রাউজার HLS সমর্থন করে না।');
               // closePlayer();
            }
        } 
        
        // ৪. DASH (.mpd) চেক করা
        else if (channel.mpd) {
            shakaContainer.style.display = 'block';
            hlsElement.style.display = 'none';

            if (!shaka.Player.isBrowserSupported()) {
               // alert('আপনার ব্রাউজার Shaka Player সমর্থন করে না।');
               // closePlayer();
                return;
            }

            // Shaka UI চেক করা
            if (typeof isShakaUINotReady === 'undefined' || isShakaUINotReady || !shakaPlayerInstance) {
                const ui = document.getElementById('shaka-video-player')['ui'];
                if (ui) {
                    shakaPlayerInstance = ui.getControls().getPlayer();
                    shakaPlayerInstance.configure({
                        streaming: { bufferingGoal: 1, rebufferingGoal: 0.5 }
                    });
                } else {
                    console.error("Shaka UI Not Ready");
                   // alert('প্লেয়ার লোড হতে সমস্যা হচ্ছে।');
                    //closePlayer();
                    return;
                }
            }

            // DRM এবং ক্লিয়ারকি সেটআপ
            if (channel.clearkey) {
                const keyId = channel.clearkey.keyId.replace(/-/g, '');
                const key = channel.clearkey.key.replace(/-/g, '');
                shakaPlayerInstance.configure({
                    drm: { clearKeys: { [keyId]: key } }
                });
            } else if (channel.drm && channel.drm.licenseUrl) {
                const servers = {};
                if (channel.drm.type === 'widevine') {
                    servers['com.widevine.alpha'] = channel.drm.licenseUrl;
                }
                shakaPlayerInstance.configure({
                    drm: { servers: servers }
                });
            } else {
                shakaPlayerInstance.configure({ drm: {} });
            }

            // ভিডিও লোড করা
            await shakaPlayerInstance.load(channel.mpd);
            document.getElementById('shaka-video-player').play();
            console.log('DASH ভিডিও লোড হয়েছে!');

        } else {
          //  alert('aaaaaaaaaaaaa');
          //  closePlayer();
        }
    } catch (e) {
        console.error("Error playing channel:", e);
        //alert("gggggggggggg");
       // closePlayer();
    }
}
        // Shaka Player error handler
        function onErrorEvent(event) {
            onError(event.detail);
        }

        function onError(error) {
            console.error('', error);
            //alert('111');
           // closePlayer();
        }

        function closePlayer() {
            videoPlayerContainer.classList.add('hidden');
            videoPlayerContainer.classList.remove('flex');
            resetPlayers();
        }

        // Event listeners
        
        tabButtons.forEach(button => {
            button.addEventListener('click', (event) => {
                tabButtons.forEach(btn => {
                    btn.classList.remove('active');
                    btn.classList.remove('bg-gray-600', 'hover:bg-gray-500', 'shadow-inner');
                    btn.classList.add('bg-gray-700', 'hover:bg-gray-600', 'shadow-md');
                });
                event.target.classList.add('active', 'bg-gray-600', 'hover:bg-gray-500', 'shadow-inner');
                event.target.classList.remove('bg-gray-700', 'hover:bg-gray-600');

                const tab = event.target.dataset.tab;
                localStorage.setItem('activeTab', tab);
                loadAndDisplayChannels(tab);
            });
        });

        const searchBar = document.querySelector('.search-bar');
        searchBar.addEventListener('input', (event) => {
            const searchTerm = event.target.value.toLowerCase();
            if (nStreamPlayerSection.classList.contains('flex')) {
                return;
            }
            const filteredChannels = currentLoadedChannels.filter(channel =>
                channel.name.toLowerCase().includes(searchTerm)
            );
            displayChannels(filteredChannels);
        });

        // N Stream specific logic
        streamTypeSelect.addEventListener('change', () => {
            if (streamTypeSelect.value === 'DASH') {
                drmControls.classList.remove('hidden');
                drmControls.classList.add('flex');
            } else {
                drmControls.classList.add('hidden');
                drmControls.classList.remove('flex');
                clearkeyIdInput.value = '';
                clearkeyKeyInput.value = '';
                drmLicenseUrlInput.value = '';
            }
        });

        playNStreamBtn.addEventListener('click', () => {
            const streamUrl = streamUrlInput.value.trim();
            const streamType = streamTypeSelect.value;
            let channelConfig = {
                name: 'N Stream Custom Playback',
                logo: '',
                mpd: null,
                m3u8: null,
                clearkey: null,
                drm: null
            };

            if (!streamUrl) {
                //alert('222');
                return;
            }

            if (streamType === 'HLS') {
                channelConfig.m3u8 = streamUrl;
            } else if (streamType === 'DASH') {
                channelConfig.mpd = streamUrl;
                const clearkeyId = clearkeyIdInput.value.trim();
                const clearkeyKey = clearkeyKeyInput.value.trim();
                const drmLicenseUrl = drmLicenseUrlInput.value.trim();

                if (clearkeyId && clearkeyKey) {
                    channelConfig.clearkey = {
                        keyId: clearkeyId,
                        key: clearkeyKey
                    };
                }
                if (drmLicenseUrl) {
                    channelConfig.drm = {
                        type: 'widevine',
                        licenseUrl: drmLicenseUrl
                    };
                }
            }
            playChannel(channelConfig);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedTab = localStorage.getItem('activeTab');
            let tabToActivate = savedTab || 'jio-tv'; // Default to jio-tv

            const urlParams = new URLSearchParams(window.location.search);
            const nParam = urlParams.get('n');

            if (nParam) {
                tabToActivate = 'n-stream';
                let streamUrl = nParam;
                let clearkeyId = '';
                let clearkeyKey = '';
                let drmLicenseUrl = '';
                let streamType = 'HLS';

                const dashClearKeyPattern = /^([^|]+)\|drmScheme=clearkey&drmLicense=([^:]+):(.+)$/;
                const matchClearKey = nParam.match(dashClearKeyPattern);

                if (matchClearKey) {
                    streamType = 'DASH';
                    streamUrl = matchClearKey[1];
                    clearkeyId = matchClearKey[2];
                    clearkeyKey = matchClearKey[3];
                    drmLicenseUrl = '';
                }
                else if (streamUrl.includes('.mpd')) {
                    streamType = 'DASH';
                    clearkeyId = '';
                    clearkeyKey = '';
                    drmLicenseUrl = '';
                } else if (streamUrl.includes('.m3u8')) {
                    streamType = 'HLS';
                    clearkeyId = '';
                    clearkeyKey = '';
                    drmLicenseUrl = '';
                }

                const nStreamTabButton = document.querySelector('.tab-button[data-tab="n-stream"]');
                if (nStreamTabButton) {
                    nStreamTabButton.click();
                    setTimeout(() => {
                        streamUrlInput.value = streamUrl;
                        streamTypeSelect.value = streamType;
                        const changeEvent = new Event('change');
                        streamTypeSelect.dispatchEvent(changeEvent);
                        if (streamType === 'DASH') {
                            clearkeyIdInput.value = clearkeyId;
                            clearkeyKeyInput.value = clearkeyKey;
                            drmLicenseUrlInput.value = drmLicenseUrl;
                        } else {
                            drmControls.classList.add('hidden');
                            drmControls.classList.remove('flex');
                            clearkeyIdInput.value = '';
                            clearkeyKeyInput.value = '';
                            drmLicenseUrlInput.value = '';
                        }
                        playNStreamBtn.click();
                    }, 100);
                }
            } else {
                const defaultButton = document.querySelector(`.tab-button[data-tab="${tabToActivate}"]`);
                if (defaultButton) {
                    defaultButton.click();
                } else {
                    document.querySelector('.tab-button[data-tab="jio-tv"]').click();
                }
            }
        });

  
  
  

function closePlayer() {
    const container = document.getElementById('video-player-container');
    container.style.display = 'none'; // পুরো ফ্রেম লুকিয়ে ফেলুন
    resetPlayers();
}
  
  
</script>
