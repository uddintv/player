<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Search & Player</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  font-family:Arial, Helvetica, sans-serif;
  color:#fff;
}
button{cursor:pointer}

/* ===== HEADER ===== */
.header{
  max-width:720px;
  margin:15px auto;
  padding:15px;
  border-radius:12px;
  text-align:center;
  background:linear-gradient(135deg,#111,#1f1f1f);
}
.logo{  text-align:center;
  padding:15px;

  font-size:26px;
  font-weight:900;
  color:#9aff00;
}
.logo span{color:#00bfff}

/* ===== SEARCH ===== */
.search-box{
  max-width:720px;
  margin:auto;
  background:#111;
  padding:15px;
  border-radius:12px;
}
.search-row{
  display:flex;
  gap:8px;
}
.search-row input{
  flex:1;
  padding:9px;
  border:none;
  border-radius:8px;
  outline:none;
}
.search-btn{
  padding:7px 14px;
  background: #222;/*#e74c3c;*/
  border:1px solid yellow;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
}
.search-btn:hover {
  background: #111;    /* হালকা ডার্ক ব্লু */
  transform: translateY(-1px); /* হালকা লিফট ইফেক্ট */
}
.clear-btn{
  padding:9px 14px;
  background:#555;
  border:none;
  border-radius:8px;
  color:#fff;
}
.clear-btn:hover {
  background: #444;    /* হালকা ডার্ক ব্লু */
  transform: translateY(-1px); /* হালকা লিফট ইফেক্ট */
}
/* ===== SUGGEST ===== */
.suggest-box{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.suggest-box button{
  flex:1 1 45%;
  padding:10px;
  border:none;
  border-radius:6px;
  color:#fff;
  font-weight:bold;
}

/* ===== MOVIE CARD ===== */
.movie-card{
  display:flex;
  gap:12px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
  margin-top:0;

  /* ⭐ এই দুই লাইন মূল fix */
  width: calc(50% - 6px);   /* এক লাইনে ২টা */
  box-sizing: border-box;
}

.movie-card img{
  width:90px;
  border-radius:6px;
}
.play-btn{
  margin-top:6px;
  padding:7px 14px;
  background:#2ecc71;
  border:none;
  border-radius:6px;
  font-weight:bold;
  
}

/* ===== PLAYER ===== */
#playerArea{
  max-width:720px;
  margin:15px auto;
  background:#111;
  padding:15px;
  border-radius:12px;
  display:block; /* ✅ not সবসময় দেখা যাবে display:none; onle show if play*/
 position:relative; /* ✅ NEW ADD*/

}
/* Server Buttons */
.server-btn {
  padding: 7px;
  height:35px;
  background: #3498db;
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 11px;
  transition: all 0.2s ease;
}

/* Hover effect */
.server-btn:hover {
  background: #1d6fa5;    /* হালকা ডার্ক ব্লু */
  transform: translateY(-2px); /* হালকা লিফট ইফেক্ট */
}

/* Active server */
.server-btn.active {
  background: #2ecc71;       /* সবুজ */
  box-shadow: 0 0 0 2px #1abc9c inset;
  transform: translateY(-1px);
}


/* ===== LOAD MORE ===== */
.load-more{
  margin:15px auto;
  display:block;
  padding:10px 5px;
  background:#9b59b6;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  
}

/* ===== FOOTER ===== */
footer{
  margin-top:20px;
  padding:12px;
  background:#0e0e0e;
  font-size:12px;
  text-align:center;
  color:#aaa;
}

  flex-wrap: wrap;
  gap: 12px;
}

@media (max-width: 600px){

.search-row select:hover,

}

/* TV controls overlay */
#tvControls {
  position: absolute;
  top: 10px;

  transition: opacity 0.3s ease;

}

/* show হলে click enable */
#tvControls.show {
  opacity: 1;

}

/* ছোট select */
#tvControls select {

}
  
/* Next-Prev Container Style */
.nav-container {

  width: 100%; /* কন্টেইনার ফুল উইডথ নিশ্চিত করবে */

.nav-btn {

.nav-btn:hover {

</style>
</head>

<script>
  
  let currentVideoId = null;
let currentIsTV = false;
let activeServerIndex = 0;


/* =====================================================
   TMDB API KEY
===================================================== */
const API_KEY = "844dba0bfd8f3a4f3799f6130ef9e335";

/* ===== Pagination & Mode ===== */
let currentPage = 1;
let currentMode = ""; // search | popular | upcoming | top_rated | today
let currentQuery = "";

/* ===== Video Servers ===== */
const servers = [
  // --- মুভি ট্রেইলার সার্ভার ---
 { name: "vidnest movie hindi", url: "https://vidnest.fun/movie/ID?server=delta" }, 
  
 { name: "vidsrc.wtf hindi", url: "https://vidsrc.wtf/api/2/movie/?id=ID" },

 { name: "Godriveplayer", url: "https://godriveplayer.com/player.php?imdb=ID" },   
{ name: "AutoEmbed", url: "https://player.autoembed.cc/embed/movie/ID" },

{name:"smashy.stream",url:"https://player.smashy.stream/movie/ID"},

{ name: "vidsrc.vip", url: "https://vidsrc.vip/embed/movie/ID" },

{ name: "cinetaro (Hindi)", url: "https://api.cinetaro.buzz/movie/ID/hindi" },
{ name: "videasy ", url: "https://player.videasy.net/movie/ID" },
  
 { name: "vidfast server=hindi", url: "https://vidfast.net/movie/ID?server=Bollywood&autoPlay=true" }, 
 { name: "autoembed MOVIES", url: "https://autoembed.co/movie/tmdb/ID" }, 

  
];

/* ===== ENTER KEY SEARCH FIX ===== */
movieName.addEventListener("keydown",e=>{
  if(e.key==="Enter") searchMovie();
});

/* =====================================================
   SEARCH MOVIE (100% WORKING)
===================================================== */
function searchMovie(){
  const q = movieName.value.trim();
  if(!q) return;

  currentPage = 1;
  currentMode = "search";
  currentQuery = q;
  result.innerHTML = "";

  fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&page=${currentPage}`)
    .then(r=>r.json())
    .then(d=>{
      if(d.results.length === 0){
        result.innerHTML = "<p style='text-align:center'>😢 কোন রেজাল্ট পাওয়া যায়নি</p>";
        return;
      }

      d.results.forEach(item=>{
        // শুধু movie এবং tv দেখাবে (person বাদ)
        if(item.media_type === "movie" || item.media_type === "tv"){
          if(item.media_type === "tv"){
            item.title = item.name;
            item.release_date = item.first_air_date;
          }
          loadMovieDetails(item);
        }
      });

      loadMoreBtn.style.display = d.page < d.total_pages ? "block" : "none";
    });
}


/* =====================================================
   TODAY RELEASED MOVIES
===================================================== */
function fetchToday(){
  const today = new Date().toISOString().split("T")[0];

  currentPage = 1;
  currentMode = "today";
  result.innerHTML = "";

  fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&primary_release_date.gte=${today}&primary_release_date.lte=${today}&page=${currentPage}`)
    .then(r=>r.json())
    .then(d=>{
      d.results.forEach(m=>loadMovieDetails(m));
      loadMoreBtn.style.display = d.page < d.total_pages ? "block" : "none";
    });
}

/* =====================================================
   CATEGORY MOVIES
===================================================== */
function fetchCategory(type){
  currentPage = 1;
  currentMode = type;
  result.innerHTML = "";

  fetch(`https://api.themoviedb.org/3/movie/${type}?api_key=${API_KEY}&page=${currentPage}`)
    .then(r=>r.json())
    .then(d=>{
      d.results.forEach(m=>loadMovieDetails(m));
      loadMoreBtn.style.display = d.page < d.total_pages ? "block" : "none";
    });
}

/* =====================================================
   LOAD MORE
===================================================== */
  const today = new Date().toISOString().split("T")[0];

  
function loadMore(){
  currentPage++;

  let url = "";

  if(currentMode==="search"){
  url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(currentQuery)}&page=${currentPage}`;
}

  else if(currentMode==="today"){
    const today = new Date().toISOString().split("T")[0];
    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&primary_release_date.gte=${today}&primary_release_date.lte=${today}&page=${currentPage}`;
  }
    else if(currentMode === "hindi_new") {
    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&primary_release_date.lte=${today}&sort_by=primary_release_date.desc&page=${currentPage}`;
  }
  else if (currentMode === "hindi") {
    // হিন্দি মুভির পরের পেজ লোড করার জন্য
    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&sort_by=popularity.desc&page=${currentPage}`;
  }
  else if(currentMode === "hindi_latest") {
    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&primary_release_year=2026&sort_by=primary_release_date.desc&page=${currentPage}`;
  }
  else if(currentMode === "hindi_series") {
    url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_original_language=hi&sort_by=first_air_date.desc&page=${currentPage}`;
  }
// loadMore ফাংশনের ভেতরে switch বা if-else এ এগুলো যোগ করুন
else if(currentMode === "all_new") {
    const today = new Date().toISOString().split("T")[0];
    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&primary_release_date.lte=${today}&sort_by=primary_release_date.desc&page=${currentPage}`;
}
else if(currentMode === "all_series") {
    url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&sort_by=popularity.desc&page=${currentPage}`;
}
else if(currentMode === "filter"){
  const type = document.getElementById("type").value;
  const year = document.getElementById("year").value;
  const month = document.getElementById("month").value;
  const lang = document.getElementById("language").value;
  const genre = document.getElementById("genre").value;

  url = `https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&page=${currentPage}`;

  if(month){
    const start = `${year}-${month}-01`;
    const end = `${year}-${month}-31`;

    if(type==="movie"){
      url += `&primary_release_date.gte=${start}&primary_release_date.lte=${end}`;
    }else{
      url += `&first_air_date.gte=${start}&first_air_date.lte=${end}`;
    }
  }else{
    if(type==="movie") url += `&primary_release_year=${year}`;
    else url += `&first_air_date_year=${year}`;
  }

  if(lang) url += `&with_original_language=${lang}`;
  if(genre) url += `&with_genres=${genre}`;
}

  else{
    url = `https://api.themoviedb.org/3/movie/${currentMode}?api_key=${API_KEY}&page=${currentPage}`;
  }

  // … অন্যান্য mode এর জন্যও রাখো যেমন আগের কোডে আছে

  fetch(url)

/* =====================================================

function loadMovieDetails(movie, type = "movie") {
  // যদি মুভির টাইটেল না থাকে (তার মানে এটি সিরিজ), তবে 'tv' ক্যাটাগরিতে সার্চ করবে
  const finalType = movie.name ? "tv" : "movie"; 
  
  fetch(`https://api.themoviedb.org/3/${finalType}/${movie.id}?api_key=${API_KEY}`)
    .then(r => r.json())
    .then(info => renderMovie(movie, info));
}

/* =====================================================
   RENDER MOVIE
===================================================== */
function renderMovie(movie,info){
  // ===== extra movie details =====
const genres = info.genres && info.genres.length
  ? info.genres.map(g => g.name).join(", ")
  : "N/A";

const language = info.original_language
  ? info.original_language.toUpperCase()
  : "N/A";

const runtime = info.runtime
  ? info.runtime + " min"
  : "N/A";

const rating = info.vote_average
  ? info.vote_average.toFixed(1)
  : "N/A";

// ... আপনার আগের সব কোড ঠিক থাকবে ...
  
  // চেক করা হচ্ছে এটা মুভি না সিরিজ
  const isTV = info.name ? true : false;
  const displayTitle = info.name || info.title;

const poster = movie.poster_path
  ? `https://image.tmdb.org/t/p/w300${movie.poster_path}`
  : "https://placehold.co/300x450?text=NO+IMAGE";

  
  result.innerHTML += `
  <div class="movie-card">
    ${poster ? `<img src="${poster}">` : ""}
    <div>
      <b style="color:#ffcc00">${displayTitle}</b><br>
      🆔 ${movie.id}<br>
      📅 ${movie.release_date || movie.first_air_date || "N/A"}<br>
      🎭 ${info.genres ? info.genres.map(g => g.name).join(", ") : "N/A"}<br>
      🌐 ${info.original_language?.toUpperCase() || "N/A"}<br>
      ⭐ ${info.vote_average?.toFixed(1) || "N/A"}<br>
      <button class="play-btn" onclick="playMovie(${movie.id}, ${isTV})">▶ Play</button>
    </div>
  </div>`;
}

/* =====================================================
   Filtar search
===================================================== */
function filterSearch(){
  const type = document.getElementById("type").value; // movie / tv
  const year = document.getElementById("year").value;
  const month = document.getElementById("month").value;
  const lang = document.getElementById("language").value;
  const genre = document.getElementById("genre").value;

  if(!year){
    alert("Please select a Year");
    return;
  }

  currentPage = 1;
  currentMode = "filter";
  result.innerHTML = "";

  let url = `https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&page=${currentPage}`;

  // ===== DATE FILTER =====
  if(month){
    const start = `${year}-${month}-01`;
    const end = `${year}-${month}-31`;

    if(type==="movie"){
      url += `&primary_release_date.gte=${start}&primary_release_date.lte=${end}`;
    }else{
      url += `&first_air_date.gte=${start}&first_air_date.lte=${end}`;
    }
  }else{
    if(type==="movie"){
      url += `&primary_release_year=${year}`;
    }else{
      url += `&first_air_date_year=${year}`;
    }
  }

  if(lang) url += `&with_original_language=${lang}`;
  if(genre) url += `&with_genres=${genre}`;

  fetch(url)
    .then(r=>r.json())
    .then(d=>{
      if(d.results.length === 0){
        result.innerHTML = "<p style='text-align:center'>😢 No result found</p>";
      }

      d.results.forEach(m=>{
        if(type==="tv"){
          m.title = m.name;
          m.release_date = m.first_air_date;
        }
        loadMovieDetails(m,type);
      });

      loadMoreBtn.style.display = d.page < d.total_pages ? "block" : "none";
    });
}

  let currentSeason = 1;
let currentEpisode = 1;

// ১. সিরিজ প্লে করলে সিজন লোড হবে
async function playMovie(id, isTV) {
    currentVideoId = id;
    currentIsTV = isTV;
    activeServerIndex = 0;
    playerArea.style.display = "block";

    const tvControls = document.getElementById("tvControls");
    
   if (isTV) {
        // সিরিজ হলে ড্রপডাউন দেখাবে
        tvControls.style.display = "flex"; 
        tvControls.classList.add("show"); // ৫ সেকেন্ড আইডল হওয়ার জন্য
        await fetchSeasons(id);
    } else {
        // মুভি হলে ড্রপডাউন পুরোপুরি লুকিয়ে ফেলবে
        tvControls.style.display = "none";
        tvControls.classList.remove("show");
        loadServer(0, id, false);
    }
    
    playerArea.scrollIntoView({ behavior: "smooth" });
}

// ২. TMDB থেকে সিজন সংখ্যা বের করা
async function fetchSeasons(id) {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
    const data = await res.json();
    
    const seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = ""; // আগের ডাটা ক্লিয়ার করা
    
    data.seasons.forEach(s => {
        if(s.season_number > 0) { // স্পেশাল এপিসোড বাদ দিতে চাইলে
            let opt = document.createElement("option");
            opt.value = s.season_number;
            opt.innerText = `Season ${s.season_number}`;
            seasonSelect.appendChild(opt);
        }
    });
    
    fetchEpisodes(); // প্রথম সিজনের এপিসোড লোড করা
}

// ৩. সিজন সিলেক্ট করলে এপিসোড লোড হবে
async function fetchEpisodes() {
    const sNum = document.getElementById("seasonSelect").value;
    const res = await fetch(`https://api.themoviedb.org/3/tv/${currentVideoId}/season/${sNum}?api_key=${API_KEY}`);
    const data = await res.json();
    
    const epSelect = document.getElementById("episodeSelect");
    epSelect.innerHTML = "";
    
    data.episodes.forEach(e => {
        let opt = document.createElement("option");
        opt.value = e.episode_number;
        opt.innerText = `Episode ${e.episode_number}`;// এখানে = `Episode ${e.episode_number}: ${e.name}`; ব্যবহার করে এপিসোডের নাম দেখানো হচ্ছে
        epSelect.appendChild(opt);
    });
    
    changeEpisode(); // ভিডিও প্লে করা
}

// ৪. এপিসোড পরিবর্তন এবং সার্ভার ইউআরএল আপডেট
function changeEpisode() {
    currentSeason = document.getElementById("seasonSelect").value;
    currentEpisode = document.getElementById("episodeSelect").value;
    loadServer(activeServerIndex, currentVideoId, true);
}

// ৫. loadServer ফাংশন আপডেট (এটি আপনার বর্তমান ফাংশনকে রিপ্লেস করবে)
function loadServer(i, id, isTV) {
    activeServerIndex = i;
    let url = servers[i].url.replace("ID", id);

    if (isTV) {
        // ড্রপডাউন থেকে সিজন ও এপিসোড নিয়ে লিংকে বসানো
        // বেশিরভাগ সার্ভার এই ফরম্যাট সাপোর্ট করে: &s=1&e=1
        url = url.replace("/movie/", "/tv/")
                 .replace("movie?tmdb=", "tv?tmdb=") + `&s=${currentSeason}&e=${currentEpisode}`;
        
        // কিছু বিশেষ সার্ভারের জন্য ম্যানুয়াল রিপ্লেসমেন্ট (যদি প্রয়োজন হয়)
        if(url.includes("vidsrc.me")) {
            url = `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${currentSeason}&epi=${currentEpisode}`;
        }
        if(url.includes("vidsrc.to")) {
            url = `https://vidsrc.to/embed/tv/${id}/${currentSeason}/${currentEpisode}`;
        }
    }

    player.src = url;
    fullLink.value = url;
}

async function playMovie(id, isTV) {

// ২. পরবর্তী এপিসোডে যাওয়ার ফাংশন
function nextEpisode() {
    const epSelect = document.getElementById("episodeSelect");
    const currentIndex = epSelect.selectedIndex;
    
    if (currentIndex < epSelect.options.length - 1) {
        epSelect.selectedIndex = currentIndex + 1; // পরের অপশন সিলেক্ট করবে
        changeEpisode(); // ভিডিও লোড করবে
    } else {
        alert("এটি এই সিজনের শেষ এপিসোড!");
    }
}

// ৩. আগের এপিসোডে যাওয়ার ফাংশন
function prevEpisode() {
    const epSelect = document.getElementById("episodeSelect");
    const currentIndex = epSelect.selectedIndex;
    
    if (currentIndex > 0) {
        epSelect.selectedIndex = currentIndex - 1; // আগের অপশন সিলেক্ট করবে
        changeEpisode(); // ভিডিও লোড করবে
    } else {
        alert("এটি এই সিজনের প্রথম এপিসোড!");
    }
}
