<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Show Stream</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>LIVE STREAM LINK</h3>

<div id="out">Loading...</div>

<script>

async function load(){

    try {

        let res = await fetch("https://uddintv.github.io/player/newToken-show-withLlink.html");
        let text = await res.text();

        // extract m3u8 link
        let match = text.match(/https:\/\/sa\.streamtpday1\.xyz:[0-9]+\/global\/[^"'\s]+\.m3u8[^"'\s]*/);

        if(match){

            let link = match[0].replace(/\\\//g,"/");

            // show ONLY link
            document.getElementById("out").innerText = link;

            console.log(link);

        } else {

            document.getElementById("out").innerText = "No link found";
        }

    } catch(err){
        document.getElementById("out").innerText = "Error: " + err;
    }
}

load();

</script>

</body>
</html>
