<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Show Stream FIX</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>LIVE STREAM LINK</h3>

<div id="out">Loading...</div>

<script>

async function load(){

    try {

        let res = await fetch("https://uddintv.github.io/player/newToken-show-withLlink.html");
        let text = await res.text();

        let link = null;

        // 🔥 1st try: normal m3u8
        let match1 = text.match(/https:\/\/sa\.streamtpday1\.xyz:[0-9]+\/global\/[^"'\s]+\.m3u8[^"'\s]*/);

        // 🔥 2nd try: escaped version
        let match2 = text.match(/https:\\\/\\\/sa\.streamtpday1\.xyz[^"'\s]+m3u8[^"'\s]*/);

        // 🔥 3rd try: generic m3u8
        let match3 = text.match(/https?:\/\/[^"'\s]+\.m3u8[^"'\s]*/);

        if(match1){
            link = match1[0];
        }
        else if(match2){
            link = match2[0].replace(/\\\//g,"/");
        }
        else if(match3){
            link = match3[0];
        }

        if(link){

            document.getElementById("out").innerText = link;
            console.log("FOUND:", link);

        } else {

            document.getElementById("out").innerText =
                "No link found (page format changed)";
        }

    } catch(err){
        document.getElementById("out").innerText = "Error: " + err;
    }
}

load();

</script>

</body>
</html>
