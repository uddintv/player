<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Page</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>LIVE STREAM LINK</h3>

<div id="out">Loading...</div>

<script>

async function loadStream(){

    try {

        let res = await fetch("https://uddintv.github.io/player/newToken-show-withLlink.html");
        let text = await res.text();  // ✅ FIX HERE

        // extract JSON from HTML (important)
        let jsonStart = text.indexOf("{");
        let jsonEnd = text.lastIndexOf("}") + 1;

        let jsonString = text.slice(jsonStart, jsonEnd);

        let data = JSON.parse(jsonString);  // now safe

        if(data.status === "success"){

            document.getElementById("out").innerHTML = `
                <textarea style="width:100%;height:120px;">
${data.url}
                </textarea>
            `;

            console.log(data.url);

        } else {

            document.getElementById("out").innerHTML = "No stream found";
        }

    } catch(err){

        document.getElementById("out").innerHTML =
            "Error: " + err;
    }
}

loadStream();

</script>

</body>
</html>
