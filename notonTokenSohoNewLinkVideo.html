<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Token Extract</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>FINAL M3U8 TOKEN LINK</h3>

<div id="out">Loading...</div>

<script>

async function loadToken(){

    try {

        let res = await fetch("https://uddintv.github.io/player/newToken-show-withLlink.html");
        let html = await res.text();

        // extract m3u8 link
        let match = html.match(/https:\/\/sa\.streamtpday1\.xyz:[0-9]+\/global\/[^"]+\.m3u8[^"]*/);

        if(match){

            let link = match[0];

            document.getElementById("out").innerHTML = `
                <textarea style="width:100%;height:120px;">
${link}
                </textarea>
            `;

            console.log("TOKEN LINK:", link);

        } else {

            document.getElementById("out").innerHTML = "No token found";

        }

    } catch(err){
        document.getElementById("out").innerHTML = "Error: " + err;
    }

}

loadToken();

</script>

</body>
</html>
