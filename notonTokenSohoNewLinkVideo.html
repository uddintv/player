<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Page</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>LIVE STREAM LINK</h3>

<div id="out">Loading...</div>

<script>

async function loadStream(){

    try {

        let res = await fetch("https://uddintv.github.io/player/newToken-show-withLlink.html");
        let data = await res.json();

        if(data.status === "success"){

            document.getElementById("out").innerHTML = `
                <p style="color:lime">LIVE LINK FOUND</p>
                <textarea style="width:100%;height:120px;">
${data.url}
                </textarea>
            `;

            console.log("STREAM:", data.url);

        } else {

            document.getElementById("out").innerHTML =
                "No stream found";

        }

    } catch(err){

        document.getElementById("out").innerHTML =
            "Error: " + err;

    }
}

loadStream();

</script>

</body>
</html>
