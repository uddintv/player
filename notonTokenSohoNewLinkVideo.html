<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DDDDDDD</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>FINAL TOKEN LINK</h3>

<div id="out">Loading...</div>

<script>

async function loadToken(){

    try {

        let res = await fetch("/player/newToken-show-withLlink.html");
        let html = await res.text();

        // convert HTML string → DOM
        let doc = new DOMParser().parseFromString(html, "text/html");

        // try textarea first
        let ta = doc.querySelector("textarea");

        let link = "";

        if(ta && ta.value.includes("m3u8")){
            link = ta.value.trim();
        } 
        else {

            // fallback regex (escaped + normal)
            let match = html.match(/https?:\/\/[^"' ]+\.m3u8[^"' ]*/);

            if(match){
                link = match[0].replace(/\\\//g,"/");
            }
        }

        if(link){

            document.getElementById("out").innerHTML = `
                <textarea style="width:100%;height:120px;">${link}</textarea>
            `;

            console.log("FOUND:", link);

        } else {
            document.getElementById("out").innerHTML = "No token found";
        }

    } catch(err){
        document.getElementById("out").innerHTML = "Error: " + err;
    }
}

loadToken();

</script>

</body>
</html>
