<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U8 Player with Link</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

video {
    width:90%;
    max-width:900px;
    margin-top:20px;
}

#linkBox {
    margin-top:15px;
    padding:10px;
    word-break:break-all;
    background:#111;
    border-top:1px solid #333;
    font-size:14px;
}
</style>
</head>

<body>

<h3>Live Stream Player</h3>

<video id="video" controls autoplay></video>

<div id="linkBox">Loading stream link...</div>

<script>

const tokenPage = "https://uddintv.github.io/player/newToken-show-withLlink.html";

fetch(tokenPage)
.then(res => res.text())
.then(html => {

    // বেশি flexible regex (সব m3u8 ধরবে)
    let match = html.match(/(https?:\/\/[^\s"'<>]+\.m3u8[^"'<>]*)/);

    if(!match){
        document.getElementById("linkBox").innerHTML = "❌ M3U8 link not found";
        return;
    }

    let streamURL = match[1];

    // 👉 নিচে লিংক দেখাও
    document.getElementById("linkBox").innerHTML =
        "🔗 Stream URL:<br><br>" + streamURL;

    console.log("Stream URL:", streamURL);

    let video = document.getElementById('video');

    if (Hls.isSupported()) {
        let hls = new Hls();
        hls.loadSource(streamURL);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    }
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamURL;
        video.play();
    }

})
.catch(err => {
    document.getElementById("linkBox").innerHTML =
        "❌ Error loading page: " + err;
});

</script>

</body>
</html>
