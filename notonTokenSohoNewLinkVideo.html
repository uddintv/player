<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live M3U8 Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

video {
    width:90%;
    max-width:900px;
    margin-top:20px;
    background:black;
}

#linkBox {
    margin-top:15px;
    padding:10px;
    word-break:break-all;
    background:#111;
    font-size:13px;
    border-top:1px solid #333;
}
</style>
</head>

<body>

<h3>Live Stream Player</h3>

<video id="video" controls autoplay></video>

<div id="linkBox">Loading stream...</div>

<script>

const sourcePage =
"https://uddintv.github.io/player/newToken-show-withLlink.html";

fetch(sourcePage)
.then(res => res.text())
.then(html => {

    let match = html.match(/https?:\/\/[^\s"'<>]+\.m3u8[^\s"'<>]*/);

    if(!match){
        document.getElementById("linkBox").innerHTML =
        "❌  not found";
        return;
    }

    let streamURL = match[0];

    // show link
    document.getElementById("linkBox").innerHTML =
    "🔗 Stream URL:<br><br>" + streamURL;

    let video = document.getElementById("video");

    if (Hls.isSupported()) {

        let hls = new Hls();
        hls.loadSource(streamURL);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });

    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamURL;
        video.play();
    }

})
.catch(err => {
    document.getElementById("linkBox").innerHTML =
    "❌ not: " + err;
});

</script>

</body>
</html>
