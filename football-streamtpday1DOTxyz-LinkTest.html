<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Channel Extractor</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<h3>CHANNEL LIST (AUTO + FIXED DOMAIN)</h3>

<div id="out"></div>

<script>

const proxy =
"https://purple-dust-525dproxy.nu01302910955.workers.dev/?url=";

const source =
"https://streamtpday1.xyz/";

async function load(){

    let res = await fetch(proxy + encodeURIComponent(source));
    let html = await res.text();

    let out = document.getElementById("out");

    // 🔥 match BOTH domains
    let regex = /(https:\/\/(streamtpday1\.xyz|streamtp-x-y-z\.ws)\/global1\.php\?stream=([a-zA-Z0-9_]+))/g;

    let match;
    let list = [];

    while((match = regex.exec(html)) !== null){

        let fullUrl = match[1];
        let streamName = match[3];

        // 🔥 replace old domain with new
        let fixedUrl = fullUrl.replaceAll(
            "streamtp-x-y-z.ws",
            "streamtpday1.xyz"
        );

        list.push({
            name: streamName,
            url: fixedUrl
        });
    }

    // remove duplicates
    let unique = {};
    list.forEach(item => {
        unique[item.url] = item;
    });

    Object.values(unique).forEach(item => {

        console.log(item.name + " => " + item.url);

        let div = document.createElement("div");
        div.style.padding = "8px";
        div.style.borderBottom = "1px solid #333";

        div.innerHTML = `
            <b style="color:yellow">${item.name}</b><br>
            <span style="color:#0ff">${item.url}</span>
        `;

        out.appendChild(div);

    });

}

load();

</script>

</body>
</html>
