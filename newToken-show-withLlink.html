<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U8 API</title>
</head>

<body style="background:#000;color:#fff;">

<pre id="out">Loading...</pre>

<script>

var url =
"https://purple-dust-525dproxy.nu01302910955.workers.dev/?url=" +
encodeURIComponent("https://streamtpday1.xyz/global2.php?stream=dsportsplus");

fetch(url)
.then(res => res.text())
.then(html => {

    let match = html.match(/playbackURL\s*=\s*"([^"]+)"/);

    if(match){

        let playbackURL = match[1].replace(/\\\//g,"/");

        // 🔥 ONLY RAW LINK OUTPUT (API STYLE)
        document.body.innerText = playbackURL;

        console.log(playbackURL);

    } else {

        document.body.innerText = "ERROR: NO LINK FOUND";
    }

})
.catch(err => {

    document.body.innerText = "ERROR: " + err;
});

</script>

</body>
</html>
