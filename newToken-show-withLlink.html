<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U8 Extractor</title>
</head>
<body style="background:#000;color:#fff;">

<h3>Playback URL</h3>

<div id="result">Loading...</div>

<script>

var url =
"https://purple-dust-525dproxy.nu01302910955.workers.dev/?url=" +
encodeURIComponent("https://streamtpday1.xyz/global2.php?stream=dsportsplus");

fetch(url)
.then(response => response.text())
.then(html => {

    let match = html.match(/playbackURL\s*=\s*"([^"]+)"/);

    if(match){

        let playbackURL = match[1]
            .replace(/\\\//g, "/");

        document.getElementById("result").innerHTML =
            '<textarea style="width:100%;height:150px;">'
            + playbackURL +
            '</textarea>';

        console.log(playbackURL);

    }else{

        document.getElementById("result").innerHTML =
            "playbackURL not found";

    }

})
.catch(error => {

    document.getElementById("result").innerHTML =
        "Error: " + error;

});

</script>

</body>
</html>
