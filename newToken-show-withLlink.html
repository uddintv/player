<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U8 API</title>
</head>

<body style="background:#000;color:#fff;font-family:Arial;">

<pre id="out">Loading...</pre>

<script>

var url =
"https://purple-dust-525dproxy.nu01302910955.workers.dev/?url=" +
encodeURIComponent("https://streamtpday1.xyz/global2.php?stream=dsportsplus");

fetch(url)
.then(res => res.text())
.then(html => {

    let match = html.match(/playbackURL\s*=\s*"([^"]+)"/);

    let result;

    if(match){

        let playbackURL = match[1].replace(/\\\//g,"/");

        result = {
            status: "success",
            stream: "dsportsplus",
            url: playbackURL
        };

    } else {

        result = {
            status: "error",
            message: "playbackURL not found"
        };
    }

    // show JSON
    document.getElementById("out").innerText =
        JSON.stringify(result, null, 2);

    console.log(result);

})
.catch(err => {

    let errorResult = {
        status: "error",
        message: err.toString()
    };

    document.getElementById("out").innerText =
        JSON.stringify(errorResult, null, 2);

});

</script>

</body>
</html>
