<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go9Movie Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#0f172a;
padding:10px;
z-index:999;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:18px;
font-weight:bold;
color:#38bdf8;
cursor:pointer;
}

/* DROPDOWN */
.dropdown{
position:relative;
display:inline-block;
}

.dropbtn{
background:#1e293b;
color:#fff;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.dropdown-content{
display:none;
position:absolute;
background:#111827;
min-width:160px;
z-index:1;
border-radius:6px;
overflow:hidden;
}

.dropdown-content a{
color:#fff;
padding:10px;
display:block;
text-decoration:none;
}

.dropdown-content a:hover{
background:#38bdf8;
color:#000;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* GRID */
.section{
padding:10px;
}

.section h2{
font-size:16px;
display:flex;
justify-content:space-between;
align-items:center;
color:#38bdf8;
}

.seeall{
font-size:12px;
color:#fff;
cursor:pointer;
text-decoration:underline;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card span{
display:block;
font-size:12px;
text-align:center;
padding:5px;
}

/* PLAYER */
#player{
display:none;
padding:10px;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

.server{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:10px;
}

.server button{
padding:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:#fff;
}

.server button.active{
background:#38bdf8;
color:#000;
}

.details{
display:flex;
gap:10px;
margin-top:10px;
}

.details img{
width:100px;
border-radius:8px;
}

.small{font-size:12px;color:#94a3b8}

/* MOBILE */
@media(max-width:600px){
.card img{height:150px;}
iframe{height:200px;}
}
</style>
</head>

<body>

<header>
<div class="nav">

<div class="logo" onclick="home()">🎬 GO9MOVIE</div>

<!-- MOVIES -->
<div class="dropdown">
<button class="dropbtn">Movies ▼</button>
<div class="dropdown-content">
<a onclick="load('movie/popular')">Popular</a>
<a onclick="load('trending/movie/week')">Trending</a>
<a onclick="load('movie/top_rated')">Top Rated</a>
<a onclick="loadLang('ml')">Malayalam</a>
<a onclick="loadLang('te')">Telugu</a>
</div>
</div>

<!-- TV -->
<div class="dropdown">
<button class="dropbtn">TV Series ▼</button>
<div class="dropdown-content">
<a onclick="loadTV('tv/popular')">Popular</a>
<a onclick="loadTV('tv/top_rated')">Top Rated</a>
</div>
</div>

</div>
</header>

<!-- HOME -->
<div id="home"></div>

<!-- PLAYER -->
<div id="player">

<iframe id="frame"></iframe>

<div class="server">
<button class="active" onclick="server(1)">Server 1</button>
<button onclick="server(2)">Server 2</button>
<button onclick="server(3)">Server 3</button>
<button onclick="server(4)">Server 4</button>
</div>

<div class="details">
<img id="poster">
<div>
<h3 id="title"></h3>
<p id="desc" class="small"></p>
</div>
</div>

<h3>Similar</h3>
<div id="similar" class="grid"></div>

</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="844dba0bfd8f3a4f3799f6130ef9e335";

let id=null;
let type="movie";

/* HOME SECTIONS */
window.onload=()=>{
homePage();
};

function home(){
homePage();
}

function homePage(){
document.getElementById("player").style.display="none";
document.getElementById("home").style.display="block";

document.getElementById("home").innerHTML=`
${section("Trending Movies","trending/movie/week")}
${section("Top Rated Movies","movie/top_rated")}
${section("Today Release","movie/now_playing")}
${sectionLang("Malayalam Movies","ml")}
${sectionLang("Telugu Movies","te")}
${sectionTV("Top Rated Series","tv/top_rated")}
`;
}

/* SECTION */
function section(title,path){
loadSection(path,title);
return `<div id="${path}"></div>`;
}

function sectionLang(title,lang){
loadLangSection(lang,title);
return `<div id="lang_${lang}"></div>`;
}

function sectionTV(title,path){
loadTVSection(path,title);
return `<div id="${path}"></div>`;
}

/* LOAD MOVIE SECTION */
function loadSection(path,title){
fetch(`${API}/${path}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
renderGrid(path,d.results,title);
});
}

/* LANGUAGE */
function loadLang(lang){
fetch(`${API}/discover/movie?api_key=${KEY}&with_original_language=${lang}`)
.then(r=>r.json())
.then(d=>{
renderGrid("lang_"+lang,d.results,lang.toUpperCase());
});
}

/* TV */
function loadTV(path){
fetch(`${API}/${path}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
renderGrid(path,d.results,"TV");
});
}

/* TV SECTION */
function loadTVSection(path,title){
fetch(`${API}/${path}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
renderGrid(path,d.results,title);
});
}

/* RENDER */
function renderGrid(idName,data,title){
let html=`<div class="section">
<h2>${title} <span class="seeall">SEE ALL</span></h2>
<div class="grid">`;

data.slice(0,8).forEach(m=>{
if(!m.poster_path) return;

html+=`
<div class="card" onclick="open(${m.id},'${m.title||m.name?'tv':'movie'}')">
<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
<span>${m.title||m.name}</span>
</div>`;
});

html+=`</div></div>`;

let el=document.getElementById("home");
el.innerHTML+=html;
}

/* OPEN PLAYER */
function open(movieId,mType){
id=movieId;
type=mType;

document.getElementById("home").style.display="none";
document.getElementById("player").style.display="block";

fetch(`${API}/${type}/${id}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
document.getElementById("title").innerText=d.title||d.name;
document.getElementById("desc").innerText=d.overview;
document.getElementById("poster").src="https://image.tmdb.org/t/p/w342"+d.poster_path;
});

server(1);
similar();
}

/* SERVER */
function server(n){
let url="https://example.com/"+id+"?server="+n;
document.getElementById("frame").src=url;

document.querySelectorAll(".server button").forEach((b,i)=>{
b.classList.toggle("active",i==n-1);
});
}

/* SIMILAR */
function similar(){
fetch(`${API}/${type}/${id}/similar?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
let box=document.getElementById("similar");
box.innerHTML="";

d.results.slice(0,10).forEach(m=>{
if(!m.poster_path) return;

box.innerHTML+=`
<div class="card" onclick="open(${m.id},'${type}')">
<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
<span>${m.title||m.name}</span>
</div>`;
});
});
}
</script>

</body>
</html>
