<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GO9MOVIE 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:20px;
font-weight:bold;
color:#38bdf8;
}

.search-box input{
padding:8px;
width:200px;
border-radius:6px;
border:none;
outline:none;
}

/* GRID */
.section-title{
padding:10px 15px;
color:#38bdf8;
font-size:18px;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1e293b;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card span{
display:block;
padding:5px;
font-size:13px;
text-align:center;
}

/* PLAYER */
#playerSection{
display:none;
padding:10px;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
background:#000;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:10px;
}

.buttons button{
padding:10px;
border:none;
background:#38bdf8;
color:#000;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.details{
margin-top:10px;
background:#1e293b;
padding:10px;
border-radius:8px;
}

.poster{
width:120px;
border-radius:6px;
}

.flex{
display:flex;
gap:10px;
}

.similar{
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">GO9MOVIE</div>
<div class="search-box">
<input type="text" id="search" placeholder="Search movie...">
</div>
</header>

<!-- MOVIE GRID -->
<div id="home">

<div class="section-title">🎬 Trending Movies</div>
<div class="grid" id="movies"></div>

</div>

<!-- PLAYER -->
<div id="playerSection">

<iframe id="video" src=""></iframe>

<div class="buttons">
<button onclick="server(1)">Server 1</button>
<button onclick="server(2)">Server 2</button>
<button onclick="server(3)">Server 3</button>
<button onclick="server(4)">Server 4</button>
</div>

<div class="details">
<div class="flex">
<img id="poster" class="poster">
<div>
<h3 id="title"></h3>
<p id="desc"></p>
</div>
</div>
</div>

<div class="similar">
<h3>Similar Movies</h3>
<div class="grid" id="similar"></div>
</div>

</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="844dba0bfd8f3a4f3799f6130ef9e335";

let currentId=null;

/* LOAD MOVIES */
async function loadMovies(){
let res=await fetch(API+"/trending/movie/week?api_key="+KEY);
let data=await res.json();

document.getElementById("movies").innerHTML=
data.results.map(m=>`
<div class="card" onclick="openMovie(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<span>${m.title}</span>
</div>
`).join("");
}
loadMovies();

/* OPEN MOVIE */
async function openMovie(id){
currentId=id;

let res=await fetch(API+"/movie/"+id+"?api_key="+KEY);
let m=await res.json();

document.getElementById("home").style.display="none";
document.getElementById("playerSection").style.display="block";

document.getElementById("title").innerText=m.title;
document.getElementById("desc").innerText=m.overview;
document.getElementById("poster").src="https://image.tmdb.org/t/p/w300"+m.poster_path;

/* default video */
server(1);

/* similar */
let sim=await fetch(API+"/movie/"+id+"/similar?api_key="+KEY);
let s=await sim.json();

document.getElementById("similar").innerHTML=
s.results.map(x=>`
<div class="card" onclick="openMovie(${x.id})">
<img src="https://image.tmdb.org/t/p/w300${x.poster_path}">
<span>${x.title}</span>
</div>
`).join("");
}

/* SERVER SWITCH (DUMMY LINKS) */
function server(n){
let url="";

if(n==1) url="https://www.youtube.com/embed/dQw4w9WgXcQ";
if(n==2) url="https://www.youtube.com/embed/jNQXAC9IVRw";
if(n==3) url="https://www.youtube.com/embed/M7lc1UVf-VE";
if(n==4) url="https://www.youtube.com/embed/ysz5S6PUM-U";

document.getElementById("video").src=url;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",async function(){
let q=this.value;
if(q.length<2) return loadMovies();

let res=await fetch(API+"/search/movie?api_key="+KEY+"&query="+q);
let data=await res.json();

document.getElementById("movies").innerHTML=
data.results.map(m=>`
<div class="card" onclick="openMovie(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
<span>${m.title}</span>
</div>
`).join("");
});
</script>

</body>
</html>
