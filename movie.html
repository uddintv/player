<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go9Movie 2026</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#0f172a;
padding:10px;
z-index:999;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.logo{
font-size:18px;
font-weight:bold;
color:#38bdf8;
cursor:pointer;
}

/* DROPDOWN */
.dropdown{
position:relative;
}

.dropbtn{
background:#1e293b;
color:#fff;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.dropdown-content{
display:none;
position:absolute;
background:#111827;
min-width:160px;
border-radius:6px;
overflow:hidden;
z-index:1000;
}

.dropdown-content a{
display:block;
padding:10px;
color:#fff;
text-decoration:none;
cursor:pointer;
}

.dropdown-content a:hover{
background:#38bdf8;
color:#000;
}

/* SEARCH */
.search{
padding:10px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
}

/* SECTION */
.section{
padding:10px;
}

.section h2{
display:flex;
justify-content:space-between;
align-items:center;
font-size:16px;
color:#38bdf8;
}

.seeall{
font-size:12px;
cursor:pointer;
text-decoration:underline;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card span{
display:block;
font-size:12px;
padding:5px;
text-align:center;
}

/* PLAYER */
#player{
display:none;
padding:10px;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

.server{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:10px;
}

.server button{
padding:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:#fff;
cursor:pointer;
}

.server button.active{
background:#38bdf8;
color:#000;
}

.details{
display:flex;
gap:10px;
margin-top:10px;
}

.details img{
width:100px;
border-radius:8px;
}

.small{font-size:12px;color:#94a3b8}

@media(max-width:600px){
.card img{height:140px;}
}
</style>
</head>

<body>

<header>
<div class="nav">

<div class="logo" onclick="home()">🎬 GO9MOVIE</div>

<div class="dropdown">
<button class="dropbtn" onclick="toggleMenu('m1')">Movies ▼</button>
<div id="m1" class="dropdown-content">
<a onclick="load('trending/movie/week')">Trending</a>
<a onclick="load('movie/top_rated')">Top Rated</a>
<a onclick="loadLang('ml')">Malayalam</a>
<a onclick="loadLang('te')">Telugu</a>
</div>
</div>

<div class="dropdown">
<button class="dropbtn" onclick="toggleMenu('m2')">TV ▼</button>
<div id="m2" class="dropdown-content">
<a onclick="loadTV('tv/top_rated')">Top Rated</a>
<a onclick="loadTV('tv/popular')">Popular</a>
</div>
</div>

</div>

<div class="search">
<input id="searchBox" placeholder="Search movies..." onkeypress="if(event.key==='Enter')search()">
</div>
</header>

<!-- HOME -->
<div id="home"></div>

<!-- PLAYER -->
<div id="player">

<iframe id="frame"></iframe>

<div class="server">
<button class="active" onclick="server(1)">Server 1</button>
<button onclick="server(2)">Server 2</button>
<button onclick="server(3)">Server 3</button>
<button onclick="server(4)">Server 4</button>
</div>

<div class="details">
<img id="poster">
<div>
<h3 id="title"></h3>
<p id="desc" class="small"></p>
</div>
</div>

<h3>Similar</h3>
<div id="similar" class="grid"></div>

</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="844dba0bfd8f3a4f3799f6130ef9e335";

let id=null;
let type="movie";

/* INIT */
window.onload=home;

/* HOME */
function home(){
document.getElementById("player").style.display="none";
document.getElementById("home").style.display="block";
loadHome();
}

/* HOME SECTIONS */
function loadHome(){
document.getElementById("home").innerHTML="";

loadSection("Trending Movies","trending/movie/week");
loadSection("Top Rated Movies","movie/top_rated");
loadSection("Today Release","movie/now_playing");
loadLangSection("Malayalam Movies","ml");
loadLangSection("Telugu Movies","te");
loadTVSection("Top Rated Series","tv/top_rated");
}

/* SECTION */
function loadSection(title,path){
fetch(`${API}/${path}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
render(title,d.results);
});
}

function loadLang(lang){
fetch(`${API}/discover/movie?api_key=${KEY}&with_original_language=${lang}`)
.then(r=>r.json())
.then(d=>{
render(lang.toUpperCase(),d.results);
});
}

function loadLangSection(title,lang){
fetch(`${API}/discover/movie?api_key=${KEY}&with_original_language=${lang}`)
.then(r=>r.json())
.then(d=>{
render(title,d.results);
});
}

function loadTV(path){
fetch(`${API}/${path}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
render("TV Series",d.results);
});
}

function loadTVSection(title,path){
fetch(`${API}/${path}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
render(title,d.results);
});
}

/* RENDER */
function render(title,data){
let html=`
<div class="section">
<h2>${title} <span class="seeall" onclick="home()">SEE ALL</span></h2>
<div class="grid">`;

data.slice(0,8).forEach(m=>{
if(!m.poster_path) return;

html+=`
<div class="card" onclick="openMovie(${m.id},'${m.title?'movie':'tv'}')">
<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
<span>${m.title||m.name}</span>
</div>`;
});

html+=`</div></div>`;

document.getElementById("home").innerHTML+=html;
}

/* OPEN */
function openMovie(mid,mtype){
id=mid;
type=mtype;

document.getElementById("home").style.display="none";
document.getElementById("player").style.display="block";

fetch(`${API}/${type}/${id}?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
document.getElementById("title").innerText=d.title||d.name;
document.getElementById("desc").innerText=d.overview;
document.getElementById("poster").src="https://image.tmdb.org/t/p/w342"+d.poster_path;
});

server(1);
similar();
}

/* SERVER (CHANGE HERE) */
function server(n){

let baseURL="https://YOUR-LINK-HERE.com/watch/"; 

let url="";
if(n==1) url=baseURL+id+"?s=1";
if(n==2) url=baseURL+id+"?s=2";
if(n==3) url=baseURL+id+"?s=3";
if(n==4) url=baseURL+id+"?s=4";

document.getElementById("frame").src=url;

document.querySelectorAll(".server button").forEach((b,i)=>{
b.classList.toggle("active",i==n-1);
});
}

/* SIMILAR */
function similar(){
fetch(`${API}/${type}/${id}/similar?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
let box=document.getElementById("similar");
box.innerHTML="";

d.results.slice(0,10).forEach(m=>{
if(!m.poster_path) return;

box.innerHTML+=`
<div class="card" onclick="openMovie(${m.id},'${type}')">
<img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
<span>${m.title||m.name}</span>
</div>`;
});
});
}

/* SEARCH */
function search(){
let q=document.getElementById("searchBox").value;
if(!q) return;

fetch(`${API}/search/multi?api_key=${KEY}&query=${q}`)
.then(r=>r.json())
.then(d=>{
document.getElementById("home").innerHTML="";
render("Search Results",d.results);
});
}

/* DROPDOWN */
function toggleMenu(id){
let el=document.getElementById(id);
el.style.display = (el.style.display==="block") ? "none" : "block";
}
</script>

</body>
</html>
